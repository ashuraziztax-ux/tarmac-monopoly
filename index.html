<style>
  :root { --black:#0a0a0a; --card:#1c1c1c; --border:#2a2a2a; --accent:#f59e0b; --text:#e5e5e5; --muted:#888; --red:#ef4444; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;}
  .lock{font-size:2.5rem;margin-bottom:0.75rem;}
  h1{font-size:1.15rem;font-weight:800;margin-bottom:0.4rem;}
  p{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;}
  input{width:100%;background:var(--black);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;padding:0.8rem 1rem;margin-bottom:0.85rem;text-align:center;}
  input:focus{outline:none;border-color:var(--accent);}
  button{width:100%;background:var(--accent);color:var(--black);border:none;border-radius:8px;font-size:0.95rem;font-weight:800;padding:0.8rem;cursor:pointer;letter-spacing:0.03em;}
  button:hover{opacity:0.9;}
  button:disabled{opacity:0.5;cursor:wait;}
  .err{color:var(--red);font-size:0.82rem;margin-top:0.85rem;min-height:1rem;}
  .foot{margin-top:1.5rem;font-size:0.7rem;color:#555;}
</style>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock() {
  const btn = document.getElementById('go'), err = document.getElementById('err');
  const pw = document.getElementById('pw').value;
  if (!pw) { err.textContent = "Enter a password."; return; }
  btn.disabled = true; err.textContent = "Decrypting…";
  try {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.iv) }, key, b64(ENC.ct));
    const html = new TextDecoder().decode(buf);
    document.open(); document.write(html); document.close();
  } catch (e) {
    btn.disabled = false; err.textContent = "Wrong password — try again.";
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

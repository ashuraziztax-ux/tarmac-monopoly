<style>
  :root { --black:#0a0a0a; --card:#1c1c1c; --border:#2a2a2a; --accent:#f59e0b; --text:#e5e5e5; --muted:#888; --red:#ef4444; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}

  input:focus{outline:none;border-color:var(--accent);}
  button{width:100%;background:var(--accent);color:var(--black);border:none;border-radius:8px;font-size:0.95rem;font-weight:800;padding:0.8rem;cursor:pointer;letter-spacing:0.03em;}
  button:hover{opacity:0.9;}
  button:disabled{opacity:0.5;cursor:wait;}
  .err{color:var(--red);font-size:0.82rem;margin-top:0.85rem;min-height:1rem;}
  .foot{margin-top:1.5rem;font-size:0.7rem;color:#555;}
</style>

  var APP_VERSION='2026.06.23-2';
  function checkForUpdate(){
    fetch(window.location.pathname+'?_v='+Math.random(),{cache:'no-store'})
      .then(function(r){return r.text();})
      .then(function(h){
        var m=h.match(/APP_VERSION='([^']+)'/);
        if(m&&m[1]&&m[1]!==APP_VERSION){
          if(document.getElementById('update-banner'))return;
          var b=document.createElement('div');
          b.id='update-banner';
          b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#f59e0b;color:#0a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-family:system-ui,sans-serif;box-shadow:0 2px 12px rgba(0,0,0,.4);';
          b.innerHTML='<span style="font-size:13px;font-weight:800;">⬆ New version available (v'+m[1]+') — you are on v'+APP_VERSION+'</span><button onclick="location.reload(true)" style="background:#0a0a0a;color:#f59e0b;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:900;cursor:pointer;">Tap to update</button>';
          document.body.insertBefore(b,document.body.firstChild);
        }
      }).catch(function(){});
  }
  setTimeout(checkForUpdate,4000);
  setInterval(checkForUpdate,60000);
})();
</script>
</body>
</html>
